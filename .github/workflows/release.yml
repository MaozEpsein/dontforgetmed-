name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/DontForgetMed.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/DontForgetMed.apk
          name: "Don't Forget Med ${{ github.ref_name }}"
          body: |
            📱 **Don't Forget Med** — גרסה ${{ github.ref_name }}

            להתקנה: הורד את קובץ ה-APK והפעל אותו על מכשיר אנדרואיד.
            אם ההתקנה חסומה — אפשר "התקנה ממקורות לא ידועים" בהגדרות.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
